name: Build & Deploy

on:
  push:
    branches:
      - qa
      - main

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────
  # QA → Build Staging Image + Deploy Staging
  # ──────────────────────────────────────────
  build-and-deploy-staging:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/qa'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Staging Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:qa
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:qa-sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to Staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/projects/dgv"

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u dn-apps --password-stdin
            cd /opt/projects/dgv

            cat > .env << 'ENVEOF'
            GOOGLE_WALLET_ISSUER_ID=${{ secrets.GOOGLE_WALLET_ISSUER_ID }}
            GOOGLE_WALLET_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT_EMAIL }}
            GOOGLE_WALLET_PRIVATE_KEY=${{ secrets.GOOGLE_WALLET_PRIVATE_KEY }}
            ENVEOF

            docker compose pull
            docker compose up -d --remove-orphans && echo "Staging Deploy erfolgreich" || (echo "Deploy fehlgeschlagen – alter Container läuft weiter" && exit 1)
            docker image prune -f

  # ──────────────────────────────────────────
  # MAIN → Build Prod Image + Deploy Prod
  # ──────────────────────────────────────────
  build-and-deploy-prod:
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Prod Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:latest
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:prod-sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.prod.yml to Prod server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/projects/dgv"

      - name: Rename to docker-compose.yml on Prod server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            mv /opt/projects/dgv/docker-compose.prod.yml /opt/projects/dgv/docker-compose.yml

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u dn-apps --password-stdin
            cd /opt/projects/dgv

            cat > .env << 'ENVEOF'
            GOOGLE_WALLET_ISSUER_ID=${{ secrets.GOOGLE_WALLET_ISSUER_ID }}
            GOOGLE_WALLET_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT_EMAIL }}
            GOOGLE_WALLET_PRIVATE_KEY=${{ secrets.GOOGLE_WALLET_PRIVATE_KEY }}
            ENVEOF

            docker compose pull
            docker compose up -d --remove-orphans && echo "Prod Deploy erfolgreich" || (echo "Deploy fehlgeschlagen – alter Container läuft weiter" && exit 1)
            docker image prune -f
